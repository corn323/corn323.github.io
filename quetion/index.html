<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>問題反應</title>
    <link href="./main.CSS" rel="stylesheet" />
</head>

<body style="background-color: #444444;">
    <div class="form">
        <h1 style="color: #FFFFFF;">問題反應</h1>
        <form method="post" action="https://formspree.io/f/mqkwbpgk">
            <label for="name" style="color: #FFFFFF;">名字or暱稱</label></br>
            <input placeholder="請輸入名字or匿稱(選填)" type="text" size="53" name="稱呼" id="name" /></br>
            <label for="email" style="color: #FFFFFF;">信箱(回覆用)</label></br>
            <input placeholder="請輸入信箱(選填)" type="text" size="53" name="信箱" id="email" /></br>
            <label for="message" style="color: #FFFFFF;">內文</label></br>
            <textarea name="內容" id="message" rows="10" cols="50"></textarea></br>
            <ul class="actions" style="list-style-type: none;position: absolute;right: 45%;">
                <li><input type="submit" value="傳送" class="primary" /> <input type="reset" value="重設" /></li>
            </ul>
        </form>
    </div>
</body>

</html>
